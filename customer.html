<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="api-base" content="" />
  <title>Customer</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/lib.js" defer></script>
  <script src="/js/customer.js" defer></script>
</head>

<body class="page-shell">
  <div class="container">

    <div class="card" id="apiError" style="display:none; border:1px solid rgba(255,120,120,.35); background: rgba(255,120,120,.08); color: #ffd0d0; font-weight:900; font-size:12px; padding:10px; margin-bottom:12px;"></div>

    <div class="row">
      <div class="card" style="flex:1">
        <h2>Customer</h2>
        <div class="fieldRow">
          <div class="field">
            <label>Customer</label>
            <select id="customer"></select>
          </div>

          <div class="field">
            <label>View</label>
            <select id="period">
              <option value="month">Month</option>
              <option value="ytd">YTD</option>
              <option value="all">All time</option>
            </select>
          </div>

          <div class="field" id="monthField">
            <label>Month</label>
            <select id="month"></select>
          </div>

          <div class="field" id="yearField" style="display:none;">
            <label>Year</label>
            <select id="year"></select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Totals</h2>
        <div class="row">
          <div class="kpi"><small>Total hours</small><b id="totalHours">0</b></div>
          <div class="kpi"><small>Total cost</small><b><span id="totalCost">0</span> <span id="currencyLabel" class="currencyLabel">SEK</span></b></div>
        </div>
      </div>

      <div class="card">
        <h2>Approval</h2>
        <div id="approvalControls">
          <div class="fieldRow" style="gap:8px; align-items:flex-end">
            <div class="field" style="min-width:140px">
              <label>Your name</label>
              <input id="approverName" placeholder="e.g. Anna Svensson" />
            </div>
            <button class="btnInline peach" id="approve">Approve</button>
            <button class="btnInline" id="revokeApproval" style="display:none">Revoke</button>
          </div>
        </div>
        <div id="approvalState" style="margin-top:8px;font-size:12px;color:var(--muted)">Not approved</div>
      </div>
    </div>

    <div class="row">
      <div class="card" style="flex:1">
        <h2>Currently working on</h2>
        <div id="runningList" class="runningList"></div>
      </div>

      <div class="card" style="flex:1">
        <h2>Consultants</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Consultant</th>
              <th style="text-align:right">Hours</th>
              <th style="text-align:right" id="costHead">Cost</th>
              <th>Running</th>
              <th id="forecastHead" style="text-align:right">Forecast</th>
            </tr>
          </thead>
          <tbody id="consultants"></tbody>
        </table>
      </div>
    </div>

    <div class="row">
      <div class="card" style="flex:1">
        <h2>Cost breakdown</h2>
        <div class="row" style="align-items:flex-start; gap:16px">
          <div style="flex:1">
            <canvas id="donut" width="240" height="240" style="max-width:240px"></canvas>
            <div id="legend" class="legend"></div>
          </div>
          <div style="flex:2">
            <div id="bars" class="bars"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card" style="flex:1">
        <h2>Logs</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Start</th>
              <th>End</th>
              <th>Task</th>
              <th>Responsible</th>
              <th style="text-align:right">Hours</th>
              <th style="text-align:right" id="logCostHead">Cost</th>
            </tr>
          </thead>
          <tbody id="logs"></tbody>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
